<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>泰郡工務系統</title>
<meta name="theme-color" content="#007AFF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="泰郡工務系統">
<style>
:root{
  --blue:#007AFF; --green:#34C759; --orange:#FF9500; --red:#FF3B30; --purple:#AF52DE;
  --bg:#f2f2f7; --card:#ffffff; --text:#1c1c1e; --text2:#8e8e93; --border:#e2e2e7;
  --inp:#f7f7fa; --shadow:0 1px 3px rgba(0,0,0,.08); --bar:rgba(255,255,255,.92);
  --safe-b:env(safe-area-inset-bottom,0px);
}
body.dark{
  --bg:#000000; --card:#1c1c1e; --text:#f2f2f7; --text2:#98989f; --border:#38383a;
  --inp:#2c2c2e; --shadow:0 1px 3px rgba(0,0,0,.5); --bar:rgba(28,28,30,.9);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;
  background:var(--bg); color:var(--text); font-size:15px; line-height:1.4;
  -webkit-font-smoothing:antialiased; overscroll-behavior:none;
}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit}
input,select,textarea{font-family:inherit; font-size:16px} /* 16px 防 iOS 放大 */

/* ===== 頂部列 ===== */
.topbar{
  position:sticky; top:0; z-index:50; background:var(--bar);
  backdrop-filter:saturate(180%) blur(20px); -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid var(--border); padding:10px 14px 8px;
  padding-top:calc(10px + env(safe-area-inset-top,0px));
}
.tb-row1{display:flex; align-items:center; justify-content:space-between; gap:8px}
.topbar .logo{font-weight:800; font-size:17px; white-space:nowrap}
.topbar .logo small{color:var(--blue)}
.site-chips{display:flex; gap:8px; overflow-x:auto; margin-top:9px; padding-bottom:2px; -webkit-overflow-scrolling:touch; scrollbar-width:none}
.site-chips::-webkit-scrollbar{display:none}
.site-chip{flex:none; padding:7px 16px; border-radius:999px; border:1.5px solid var(--border); background:var(--card); color:var(--text2); font-weight:700; font-size:14px; white-space:nowrap}
.site-chip.on{background:var(--text); color:var(--card); border-color:var(--text)}
.form-site-chips{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px}
.site-chip.sm{padding:7px 14px; font-size:13px}
.site-chip.addchip{color:var(--blue); border-style:dashed; border-color:var(--blue); background:transparent}
.icon-btn{
  width:36px; height:36px; border-radius:10px; background:var(--inp); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center; font-size:18px; color:var(--blue); flex:none;
}

/* ===== 內容區 ===== */
.screen{display:none; padding:14px; padding-bottom:calc(78px + var(--safe-b))}
.screen.active{display:block}
.card{background:var(--card); border-radius:14px; box-shadow:var(--shadow); padding:14px; margin-bottom:12px}
.card h3{margin:0 0 10px; font-size:16px}
.muted{color:var(--text2); font-size:13px}
.row{display:flex; gap:8px}
.row>*{flex:1}
label.fld{display:block; margin-bottom:10px}
label.fld>span{display:block; font-size:12px; font-weight:600; color:var(--text2); margin-bottom:4px}
.inp{
  width:100%; background:var(--inp); border:1px solid var(--border); border-radius:10px;
  padding:10px 12px; color:var(--text);
}
textarea.inp{resize:vertical; min-height:60px}
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:6px;
  background:var(--blue); color:#fff; border-radius:11px; padding:11px 14px; font-weight:700; font-size:15px;
}
.btn:active{opacity:.8}
.btn.ghost{background:var(--inp); color:var(--blue); border:1px solid var(--border)}
.btn.green{background:var(--green)}
.btn.gray{background:var(--inp); color:var(--text2); border:1px solid var(--border)}
.btn.sm{padding:7px 11px; font-size:13px; border-radius:9px}
.btn.full{width:100%}
.pill{display:inline-block; padding:3px 9px; border-radius:999px; font-size:12px; font-weight:700}

/* ===== 底部 tab ===== */
.tabbar{
  position:fixed; left:0; right:0; bottom:0; z-index:50; display:flex;
  background:var(--bar); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border); padding-bottom:var(--safe-b);
}
.tabbar button{
  flex:1; padding:8px 0 7px; display:flex; flex-direction:column; align-items:center; gap:2px;
  color:var(--text2); font-size:11px; font-weight:600;
}
.tabbar button .ic{font-size:21px; line-height:1}
.tabbar button.on{color:var(--blue)}

/* ===== 月曆 ===== */
.cal-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:8px}
.cal-head .mtitle{font-weight:800; font-size:16px}
.cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:2px}
.cal-grid .wd{text-align:center; font-size:11px; color:var(--text2); padding:4px 0; font-weight:600}
.cal-cell{
  aspect-ratio:1/1; border-radius:9px; display:flex; flex-direction:column; align-items:center;
  justify-content:flex-start; padding-top:6px; font-size:14px; position:relative; background:transparent;
}
.cal-cell.muted-day{color:var(--border)}
.cal-cell.today{font-weight:800}
.cal-cell.today .dnum{background:var(--red); color:#fff; border-radius:50%; width:26px; height:26px; display:flex; align-items:center; justify-content:center}
.cal-cell.sel{background:rgba(0,122,255,.12)}
.cal-cell .dnum{width:26px; height:26px; display:flex; align-items:center; justify-content:center}
.cal-cell .dots{display:flex; gap:3px; margin-top:3px; height:6px}
.cal-cell .dots i{width:6px; height:6px; border-radius:50%}

/* ===== 日誌卡 ===== */
.log-card{border:1px solid var(--border); border-radius:12px; padding:12px; margin-bottom:10px; position:relative}
.log-card .lc-top{display:flex; justify-content:space-between; align-items:flex-start; gap:8px}
.log-card .lc-meta{font-size:13px; color:var(--text2); margin:2px 0 8px}
.chips{display:flex; flex-wrap:wrap; gap:5px}
.chip{font-size:12px; padding:4px 9px; border-radius:999px; background:var(--inp); font-weight:600; border:1px solid var(--border)}
.chip.c-blue{background:rgba(0,122,255,.12); color:var(--blue); border-color:transparent}
.chip.c-orange{background:rgba(255,149,0,.14); color:#c2710a; border-color:transparent}
.chip.c-red{background:rgba(255,59,48,.12); color:var(--red); border-color:transparent}

/* 多選工項 */
.item-pick{display:flex; flex-wrap:wrap; gap:6px}
.item-pick .opt{
  font-size:12.5px; padding:7px 11px; border-radius:999px; background:var(--inp);
  border:1.5px solid var(--border); font-weight:600;
}
.item-pick .opt.on{background:var(--blue); color:#fff; border-color:var(--blue)}

/* ===== 材料雙欄 ===== */
.mat-wrap{display:flex; gap:0; min-height:60vh; background:var(--card); border-radius:14px; overflow:hidden; box-shadow:var(--shadow)}
.mat-nav{width:128px; flex:none; background:var(--inp); border-right:1px solid var(--border); overflow-y:auto}
.mat-cat-row{display:flex; align-items:center; gap:2px; padding:10px 5px; border-left:3px solid transparent; border-bottom:1px solid var(--border)}
.mat-cat-row.on{background:var(--card); border-left-color:var(--blue)}
.mat-cat-row .catname{flex:1; font-size:13px; font-weight:600; color:var(--text2); word-break:break-all; line-height:1.3}
.mat-cat-row.on .catname{color:var(--blue)}
.mat-cat-row .del{font-size:13px; padding:0 1px; color:var(--red)}
.mat-cat-row .cat-ctl{display:flex; gap:1px; flex:none}
.mat-cat-btn{display:block; width:100%; text-align:left; padding:13px 11px; font-size:13px; font-weight:600; color:var(--text2); border-left:3px solid transparent; border-bottom:1px solid var(--border)}
.mat-cat-btn.on{background:var(--card); color:var(--blue); border-left-color:var(--blue)}
.mat-addcat{display:block; width:100%; text-align:center; padding:12px 6px; font-size:13px; font-weight:700; color:var(--blue); border-top:1px dashed var(--border)}
.mat-list{flex:1; overflow-y:auto; padding:4px 12px 14px}
.mat-cat-head{font-weight:800; font-size:14px; color:var(--text2); margin:12px 2px 2px}
.mat-row{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:13px 4px; border-bottom:1px solid var(--border); cursor:pointer}
.mat-row .mr-name{font-weight:600; font-size:14.5px; flex:1; min-width:0}
.mat-row .mr-ord{font-size:13px; color:var(--text2); font-weight:600; white-space:nowrap}
.mr-empty{color:var(--border); font-weight:500}
.mat-row.edit{cursor:default}
.mat-row .cat-ctl{display:flex; gap:2px; flex:none}
.cat-ctl .del{font-size:14px; padding:3px 5px}
/* 庫存明細 / 總覽 */
.inv-summary{background:var(--inp); border-radius:12px; padding:12px 14px}
.inv-row{display:flex; justify-content:space-between; gap:8px; padding:5px 0; font-size:13px; border-top:1px solid var(--border)}
.inv-row:first-child{border-top:none}
.inv-spec{font-weight:600}
.inv-nums{color:var(--text2)}
.inv-nums b{color:var(--blue)}
.tx-row{display:flex; align-items:center; gap:8px; padding:9px 2px; border-bottom:1px solid var(--border)}
.tx-tag{font-size:11px; font-weight:700; padding:3px 9px; border-radius:999px; flex:none}
.tx-tag.in{background:rgba(52,199,89,.16); color:#1a8c3a}
.tx-tag.out{background:rgba(255,149,0,.16); color:#a85d00}
.tx-info{flex:1; font-size:14px}
.sum-cat{font-weight:800; font-size:14px; color:var(--text2); margin:14px 2px 4px}
.sum-row{display:flex; justify-content:space-between; align-items:center; gap:10px; padding:11px 4px; border-bottom:1px solid var(--border)}
.sum-name{font-weight:600; font-size:14.5px; flex:1}
.sum-nums{font-size:13px; color:var(--text2); white-space:nowrap}
.sum-nums b{color:var(--blue); font-size:15px}
.sum-nums small{color:var(--text2); margin-left:2px}
.mat-item{display:flex; align-items:flex-start; gap:10px; padding:11px 4px; border-bottom:1px solid var(--border)}
.mat-item .nm{font-weight:600; font-size:14px; display:flex; align-items:center; gap:6px; flex-wrap:wrap}
.mat-item .nm small{color:var(--text2); font-weight:500; font-size:12px}
.mat-item .chk{
  width:24px; height:24px; border-radius:7px; border:2px solid var(--border); flex:none; margin-top:2px;
  display:flex; align-items:center; justify-content:center; color:#fff; font-size:14px;
}
.mat-item .chk.on{background:var(--green); border-color:var(--green)}
.mat-item .qty-row{display:flex; gap:8px; margin-top:7px}
.mat-item .qty-row label{display:flex; align-items:center; gap:5px; font-size:12px; color:var(--text2); font-weight:600}
.mat-item input.qty{width:62px; text-align:center; padding:7px 4px}
.diff{font-size:11px; font-weight:700; padding:2px 7px; border-radius:999px; white-space:nowrap}
.diff.ok{background:rgba(52,199,89,.15); color:#1a8c3a}
.diff.short{background:rgba(255,59,48,.13); color:var(--red)}
.diff.over{background:rgba(255,149,0,.15); color:#a85d00}

/* ===== 材料品項群組（多規格） ===== */
.mat-group{padding:12px 2px; border-bottom:1px solid var(--border)}
.mg-head{display:flex; align-items:center; justify-content:space-between; gap:8px}
.mg-head .t{font-weight:700; font-size:15px}
.mg-head .t small{color:var(--text2); font-weight:500; font-size:12px; margin-left:2px}
.perbox{display:flex; align-items:center; gap:3px; font-size:12px; color:var(--text2); font-weight:600; flex:none}
.perbox input{width:42px; text-align:center; padding:4px; background:var(--inp); border:1px solid var(--border); border-radius:7px; color:var(--text)}
.spec-row{background:var(--inp); border-radius:11px; padding:9px 10px; margin-top:8px}
.spec-top{display:flex; align-items:center; gap:8px}
.spec-top .chk.sm{width:22px; height:22px; border-radius:6px; border:2px solid var(--border); flex:none; display:flex; align-items:center; justify-content:center; color:#fff; font-size:13px}
.spec-top .chk.sm.on{background:var(--green); border-color:var(--green)}
.spec-top input.spec-label{flex:1; min-width:0; background:var(--card); border:1px solid var(--border); border-radius:8px; padding:7px 9px; color:var(--text); font-weight:600; font-size:14px}
.spec-top .del{font-size:15px; padding:4px 6px; flex:none; opacity:.6}
.spec-q{display:flex; align-items:center; gap:10px; margin-top:8px; flex-wrap:wrap}
.spec-q label{display:flex; align-items:center; gap:4px; font-size:12px; color:var(--text2); font-weight:600}
.spec-q input{width:62px; text-align:center; padding:7px 4px; background:var(--card); border:1px solid var(--border); border-radius:8px; color:var(--text)}
.box-hint{font-size:11px; color:var(--text2); margin-top:6px}
.presets{display:flex; flex-wrap:wrap; gap:6px; margin-top:9px}
.preset-chip{font-size:12px; padding:5px 10px; border-radius:999px; background:var(--inp); border:1px dashed var(--blue); color:var(--blue); font-weight:600}

/* ===== 照片縮圖 ===== */
.photo-strip{display:flex; flex-wrap:wrap; gap:8px; margin:6px 0 10px}
.photo-strip .thumb{position:relative; width:74px; height:74px; border-radius:10px; overflow:hidden; border:1px solid var(--border)}
.photo-strip .thumb img{width:100%; height:100%; object-fit:cover; display:block}
.photo-strip .thumb-x{position:absolute; top:2px; right:2px; width:22px; height:22px; border-radius:50%; background:rgba(0,0,0,.6); color:#fff; font-size:15px; line-height:1; display:flex; align-items:center; justify-content:center}
.custom-tag{font-size:10px; background:rgba(0,122,255,.12); color:var(--blue); padding:1px 6px; border-radius:999px; font-weight:700; vertical-align:middle}
.cat-bar{display:flex; align-items:center; gap:4px; background:var(--inp); border-radius:8px; padding:7px 10px; margin:10px 2px 4px; font-size:13px}
.mat-nav .mat-addcat{color:var(--blue); font-weight:700; border-top:1px dashed var(--border); text-align:center}

/* ===== 工項進度 ===== */
.prog-group{padding:14px 14px 12px}
.pg-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:6px}
.pg-title{font-weight:800; font-size:16px}
.pg-avg{display:flex; align-items:center; gap:6px}
.pg-avgnum{font-weight:800; font-size:16px; color:var(--blue)}
.prog-row{padding:9px 0 4px; border-top:1px solid var(--border)}
.prog-row:first-of-type{border-top:none}
.prog-rowtop{display:flex; align-items:center; gap:8px; margin-bottom:6px}
.prog-floor{font-weight:600; font-size:14px; flex:1}
.prog-pct{font-weight:800; font-size:14px; color:var(--text2)}
.prog-bar{height:9px; border-radius:999px; background:var(--inp); overflow:hidden}
.prog-fill{height:100%; border-radius:999px; background:var(--blue); transition:width .15s}
.prog-fill.full{background:var(--green)}
.prog-slider{width:100%; margin:6px 0 0; accent-color:var(--blue)}
.done-tags{display:flex; flex-wrap:wrap; gap:7px; margin-top:10px}
.done-tag{display:inline-flex; align-items:center; gap:4px; background:rgba(52,199,89,.15); color:#1a8c3a; font-weight:700; font-size:13px; padding:6px 11px; border-radius:999px}
.done-tag b{color:var(--red); font-size:15px; padding:0 2px; cursor:pointer}
.del{font-size:15px; padding:2px 6px; background:none; opacity:.7}
.work-chips{display:flex; flex-wrap:wrap; gap:7px; margin-top:10px}
.work-chip{font-size:13px; font-weight:600; padding:6px 11px; border-radius:999px; background:var(--inp); border:1px solid var(--border)}
.work-chip.done{background:rgba(52,199,89,.15); color:#1a8c3a; border-color:transparent; font-weight:700}

/* ===== 進度頁（範本式：膠囊+漸層） ===== */
.prog-summary{padding:14px}
.grad-bar{height:14px; border-radius:999px; background:var(--inp); overflow:hidden; margin-top:10px}
.grad-fill{height:100%; border-radius:999px; background:linear-gradient(90deg,#ffd2e3,#ff2d78); min-width:2px}
.prog-sect{padding:14px 2px 12px; border-bottom:1px solid var(--border)}
.ps-head{display:flex; align-items:center; justify-content:space-between; gap:8px; cursor:pointer}
.ps-name{font-weight:800; font-size:16px; color:var(--blue)}
.ps-meta{font-size:13px; color:var(--text2); font-weight:600; display:flex; align-items:center; gap:5px; white-space:nowrap}
.ps-meta b{color:var(--text); font-size:15px}
.ps-caret{color:var(--text2); font-size:12px}
.thin-bar{position:relative; height:14px; border-radius:6px; background:var(--inp); overflow:hidden; margin:8px 0}
.thin-fill{height:100%; background:var(--blue); transition:width .15s}
.thin-fill.full{background:var(--green)}
.thin-bar::after{content:''; position:absolute; inset:0; pointer-events:none;
  background:repeating-linear-gradient(90deg, transparent 0, transparent calc(10% - 2px), var(--bg) calc(10% - 2px), var(--bg) 10%)}
.floor-pills{display:flex; flex-wrap:wrap; gap:8px; margin-top:6px}
.floor-pill{font-size:13px; font-weight:700; padding:7px 13px; border-radius:999px; border:1.5px solid var(--border)}
.floor-pill.zero{color:var(--text2); background:var(--inp); opacity:.65}
.floor-pill.active{color:var(--text); background:var(--card); border-color:var(--text2)}
.floor-pill.done{color:#1a8c3a; background:rgba(52,199,89,.18); border-color:transparent}

/* ===== 記錄卡片 / 表單項目 ===== */
.rc-items{display:flex; flex-direction:column; gap:6px}
.rc-line{display:flex; align-items:center; gap:6px; font-size:14px; flex-wrap:wrap}
.rc-line .cdot{width:8px; height:8px; border-radius:50%; flex:none}
.rc-line .rc-hc{color:var(--text2); font-size:12px}
.rc-line .rc-pct{margin-left:auto; font-weight:800; font-size:13px; color:var(--text2)}
.rc-line .rc-pct.done{color:var(--green)}
.rec-item{background:var(--inp); border-radius:12px; padding:10px; margin-bottom:10px}
.ri-top{display:flex; align-items:center; gap:8px; margin-bottom:8px}
.ri-top select{flex:1; min-width:0; background:var(--card)}
.ri-top .icon-btn{width:34px; height:34px; font-size:16px}

/* ===== 算料 ===== */
.seg{display:flex; background:var(--inp); border-radius:10px; padding:3px; margin-bottom:12px}
.seg button{flex:1; padding:9px; border-radius:8px; font-weight:700; font-size:14px; color:var(--text2)}
.seg button.on{background:var(--card); color:var(--text); box-shadow:var(--shadow)}
.result-row{display:flex; justify-content:space-between; align-items:center; padding:11px 2px; border-bottom:1px solid var(--border)}
.result-row .rv{font-weight:800; font-size:16px}
.result-row .rv small{font-weight:600; color:var(--text2); font-size:12px; margin-left:3px}
.warn{
  background:rgba(255,149,0,.12); border:1px solid rgba(255,149,0,.4); color:#a85d00;
  border-radius:12px; padding:12px; font-size:13.5px; line-height:1.5; margin-top:12px; font-weight:600;
}
.set-row{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:4px 0}
.set-row>span{font-weight:600}
.bk-times{background:var(--inp); border-radius:12px; padding:12px 14px; font-size:13px; line-height:1.9}
.bk-times.need{border:1px solid rgba(255,59,48,.4)}
.bk-warn{color:var(--red); font-weight:700; margin-top:4px}
.bk-ok{color:#1a8c3a; font-weight:700; margin-top:4px}

/* ===== 照片紀錄 ===== */
.pr-body{display:flex; gap:12px; align-items:flex-start}
.pr-thumb{width:84px; height:84px; flex:none; border-radius:10px; overflow:hidden; background:var(--inp); border:1px solid var(--border)}
.pr-thumb img{width:100%; height:100%; object-fit:cover; display:block}
.pr-fields{flex:1; min-width:0; font-size:14px}

/* ===== A4 報告 ===== */
#reportOverlay{position:fixed; inset:0; z-index:300; background:var(--bg); display:none; flex-direction:column; overflow-y:auto}
#reportOverlay.show{display:flex}
.rpt-toolbar{position:sticky; top:0; display:flex; gap:10px; justify-content:center; padding:12px; padding-top:calc(12px + env(safe-area-inset-top,0px)); background:var(--bar); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); z-index:2}
.rpt-pages{padding:14px; display:flex; flex-direction:column; align-items:center; gap:14px}
.rpt-page{background:#fff; color:#111; width:100%; max-width:760px; padding:22px 24px; box-shadow:0 1px 6px rgba(0,0,0,.15); border-radius:4px}
.rpt-head{text-align:center; border-bottom:2px solid #111; padding-bottom:8px; margin-bottom:14px}
.rpt-title{font-size:20px; font-weight:800}
.rpt-sub{font-size:13px; margin-top:4px}
.rpt-photo{display:flex; gap:14px; align-items:stretch; margin-bottom:14px; page-break-inside:avoid; break-inside:avoid}
.rpt-img{flex:1.4; min-width:0; border:1px solid #ccc; display:flex; align-items:center; justify-content:center; background:#fafafa; height:200px; overflow:hidden}
.rpt-img img{width:100%; height:100%; object-fit:contain}
.rpt-noimg{color:#999; font-size:13px}
.rpt-tbl{flex:1; border-collapse:collapse; font-size:13px}
.rpt-tbl th,.rpt-tbl td{border:1px solid #999; padding:6px 8px; text-align:left; vertical-align:top}
.rpt-tbl th{background:#f0f0f0; width:54px; white-space:nowrap; font-weight:700}

@media print{
  body > *:not(#reportOverlay){ display:none !important; }
  #reportOverlay{ position:static; display:block !important; background:#fff; overflow:visible }
  .rpt-toolbar{ display:none !important; }
  .rpt-pages{ padding:0; gap:0 }
  .rpt-page{ max-width:none; width:auto; box-shadow:none; border-radius:0; padding:0; page-break-after:always }
  .rpt-page:last-child{ page-break-after:auto }
  .rpt-img{ height:5.5cm }
}
@page{ size:A4 portrait; margin:12mm }

/* ===== modal ===== */
.modal-bg{position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:100; display:none; align-items:flex-end}
.modal-bg.show{display:flex}
.modal{
  background:var(--card); width:100%; border-radius:18px 18px 0 0; padding:18px 16px;
  padding-bottom:calc(18px + var(--safe-b)); max-height:90vh; overflow-y:auto;
  animation:slideup .25s ease;
}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal h3{margin:0 0 14px; display:flex; justify-content:space-between; align-items:center}
.modal h3 .x{font-size:24px; color:var(--text2); padding:0 6px}

.empty{text-align:center; color:var(--text2); padding:36px 12px; font-size:14px}
.toast{
  position:fixed; left:50%; bottom:calc(86px + var(--safe-b)); transform:translateX(-50%);
  background:rgba(0,0,0,.85); color:#fff; padding:11px 18px; border-radius:999px; font-size:14px;
  font-weight:600; z-index:200; opacity:0; transition:opacity .2s; pointer-events:none; max-width:90vw; text-align:center;
}
.toast.show{opacity:1}
.coeff-grid{display:grid; grid-template-columns:1fr 78px 44px; gap:8px 10px; align-items:center}
.coeff-grid .h{font-size:11px; color:var(--text2); font-weight:700}
</style>

<script>
/* =================== 常數 =================== */
const PING = 3.305785;             // 1 坪 = 3.305785 m²
const BOARD_AREA = 1.674;          // 3'×6' 板材 ≈ 1.674 m²（參考既有 KEY_WIDTHS）

// 13 項施工項目 → 顏色分類（隔間=藍 / 天花=橘 / 批土其他=紅）
const LOG_ITEMS = [
  '吊料','放樣','輕隔間立骨','隔間牆單面封板','隔間牆雙面封板','隔間牆填棉','隔間牆灌漿',
  '隔間牆批土','暗架天花骨架吊筋','暗架天花板封板','暗架天花批土','明架天花板骨架吊筋','明架天花板鋪設'
];
const ITEM_COLOR = {
  '吊料':'red','放樣':'blue','輕隔間立骨':'blue','隔間牆單面封板':'blue','隔間牆雙面封板':'blue',
  '隔間牆填棉':'blue','隔間牆灌漿':'red','隔間牆批土':'red','暗架天花骨架吊筋':'orange',
  '暗架天花板封板':'orange','暗架天花批土':'red','明架天花板骨架吊筋':'orange','明架天花板鋪設':'orange'
};
const COLOR_HEX = {blue:'#007AFF', orange:'#FF9500', red:'#FF3B30'};

// 材料點收：分類 → 品項（unit=計量單位；perBox=每箱支數(箱裝品項)；presets=常見規格快選）
const MAT_CATS = [
  {key:'frame', name:'隔間/天花骨架', items:[
    {name:'上下槽', unit:'支', presets:['3m','4m']},
    {name:'立柱', unit:'支', presets:['50mm×3m','65mm×3m','75mm×3m','92mm×3m','75mm×4m','92mm×4m']},
    {name:'加強橫支', unit:'支', presets:['3m','4m']},
    {name:'大百葉', unit:'支', presets:['12尺','10尺']},
    {name:'蜈蚣腳', unit:'支', presets:['12尺','10.8尺']},
    {name:'暗架收邊', unit:'支', presets:['8尺','10尺','12尺']},
    {name:'明架收邊', unit:'支', perBox:40, presets:['10尺','12尺']},
    {name:'大T', unit:'支', perBox:50, presets:['12尺']},
    {name:'小T', unit:'支', perBox:75, presets:['4尺','2尺']},
    {name:'吊筋', unit:'支', presets:['3尺','4尺','6尺']},
  ]},
  {key:'board', name:'板材類', items:[
    {name:'石膏板', unit:'片', presets:['9mm','12mm','15mm']},
    {name:'矽酸鈣板', unit:'片', presets:['6mm','8mm','9mm','12mm']},
    {name:'纖維水泥板', unit:'片', presets:['6mm','8mm','9mm']},
    {name:'明架天花板', unit:'箱', presets:[]},
    {name:'鋁企口', unit:'片', presets:[]},
    {name:'PVC', unit:'片', presets:[]},
  ]},
  {key:'extra', name:'其他材料', items:[
    {name:'岩棉', unit:'包', presets:['60x120','60x100']},
    {name:'玻璃棉', unit:'包', presets:[]},
    {name:'護角', unit:'支', presets:[]},
    {name:'加強鐵片', unit:'片', presets:[]},
    {name:'水泥', unit:'包', presets:[]},
    {name:'保麗龍', unit:'包', presets:[]},
    {name:'檢修口', unit:'個', presets:['45×45','60×60']},
  ]},
];
// 依品項名稱快速查設定
const MAT_DEF = {};
MAT_CATS.forEach(c=>c.items.forEach(it=>{ MAT_DEF[it.name]={...it, cat:c.key}; }));

// 算料工法 → 預設係數（每坪數量，可編輯；預設僅供參考，請依實際叫貨微調）
const DEFAULT_COEFFS = {
  part_single:{label:'輕隔間牆(單面封板)', mats:[
    {name:'立柱',unit:'支',c:1.2},{name:'上下槽',unit:'支',c:0.9},
    {name:'矽酸鈣板',unit:'片',c:2.1},{name:'岩棉',unit:'包',c:0.35},
    {name:'水泥',unit:'包',c:0},{name:'保麗龍',unit:'包',c:0},
  ]},
  part_double:{label:'輕隔間牆(雙面封板)', mats:[
    {name:'立柱',unit:'支',c:1.2},{name:'上下槽',unit:'支',c:0.9},
    {name:'矽酸鈣板',unit:'片',c:4.0},{name:'岩棉',unit:'包',c:0.4},
    {name:'水泥',unit:'包',c:0},{name:'保麗龍',unit:'包',c:0},
  ]},
  ceil_dark:{label:'暗架天花板', mats:[
    {name:'吊筋',unit:'支',c:1.0},{name:'大百葉',unit:'支',c:0.9},{name:'蜈蚣腳',unit:'支',c:1.6},
    {name:'收邊',unit:'支',c:0.6},{name:'矽酸鈣板',unit:'片',c:2.1},
  ]},
  ceil_bright:{label:'明架天花板', warn:true, mats:[
    {name:'大T',unit:'支',c:0.9},{name:'小T',unit:'支',c:1.6},{name:'收邊',unit:'支',c:0.6},
    {name:'吊筋',unit:'支',c:1.0},{name:'明架天花板',unit:'箱',c:0.6},
  ]},
};
const BRIGHT_WARN = '⚠️ 提示：明架落料單純置入骨架內即可，單價與工法計算中，切勿重複計入「批土/補土膏」與接縫紙帶成本。';

/* =================== 狀態 =================== */
function uid(){ return 'id'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function todayStr(){ const d=new Date(); return fmtDate(d); }
function fmtDate(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

let state = loadState();
let view = { tab:'log', calcMode:'area', matCat:null, matMode:'list', matEdit:false, progEdit:false, progView:'work', workCollapsed:{}, floorCollapsed:{},
  calMonth:(new Date()).getMonth(), calYear:(new Date()).getFullYear(), selDate:todayStr() };

function defaultState(){
  const sid = uid();
  return { sites:[{id:sid, name:'案場一'}], activeSiteId:sid,
    records:{}, progress:{}, attendance:[], vendors:{}, workItems:LOG_ITEMS.slice(),
    materials:{}, calcCoeffs:null };
}
function loadState(){
  let s=null;
  try{ s=JSON.parse(localStorage.getItem('wm_state')); }catch(e){}
  if(!s||!s.sites||!s.sites.length) return defaultState();
  return migrateState(s);
}
function migrateState(s){
  s.workItems = s.workItems || LOG_ITEMS.slice();
  s.vendors   = s.vendors   || {};
  s.records   = s.records   || {};
  s.attendance= s.attendance|| [];
  s.progress  = s.progress  || {};
  s.materials = s.materials || {};
  // 一次性：把已存在目錄裡的「副資材與耗材」改名為「其他材料」
  if(!s._extraRenamed){ Object.values(s.catalog||{}).forEach(cats=>{ const c=(cats||[]).find(x=>x.name==='副資材與耗材'); if(c)c.name='其他材料'; }); s._extraRenamed=true; }
  // 一次性：把舊「實際(已收)」轉成「進料」交易
  s.matTx = s.matTx || {};
  if(!s._matTxMigrated){
    Object.keys(s.materials||{}).forEach(sid=>{
      const m=s.materials[sid]; if(!m||!m.items)return; s.matTx[sid]=s.matTx[sid]||[];
      Object.entries(m.items).forEach(([name,it])=>{ (it.specs||[]).forEach(sp=>{ const act=+sp.actual||0; if(act>0) s.matTx[sid].push({id:uid(), date:todayStr(), type:'in', item:name, spec:sp.label||'', qty:act}); }); });
    });
    s._matTxMigrated=true;
  }
  // 進度舊格式 {item,floor,percent} → {work,floor,percent,vendor}
  Object.keys(s.progress).forEach(sid=>{
    s.progress[sid]=(s.progress[sid]||[]).map(p=> (p.work!==undefined) ? p
      : {id:p.id||uid(), work:p.item||'', floor:p.floor||'', percent:p.percent||0, vendor:''});
  });
  // 舊 logs → records（一次性轉換，含建立進度項與廠商清單）
  if(Array.isArray(s.logs) && s.logs.length){
    s.logs.forEach(l=>{
      const sid=l.siteId; if(!sid) return;
      s.records[sid]=s.records[sid]||[]; s.progress[sid]=s.progress[sid]||[];
      const works=(l.items&&l.items.length)?l.items:[''];
      const items=works.map((w,idx)=>{
        let p=s.progress[sid].find(x=>x.work===w && x.floor===(l.floor||''));
        if(!p){ p={id:uid(), work:w, floor:l.floor||'', percent:0, vendor:l.vendor||''}; s.progress[sid].push(p); }
        return { progressId:p.id, headcount: idx===0?(parseFloat(l.headcount)||0):0 };
      });
      s.records[sid].push({ id:l.id||uid(), date:l.date, vendor:l.vendor||'', items, note:l.note||'', photos:l.photos||[] });
      if(l.vendor){ s.vendors[sid]=s.vendors[sid]||[]; if(!s.vendors[sid].includes(l.vendor)) s.vendors[sid].push(l.vendor); }
    });
    delete s.logs;
  }
  return s;
}
function saveState(){ localStorage.setItem('wm_state', JSON.stringify(state)); markChanged(); }
function activeSite(){ return state.sites.find(s=>s.id===state.activeSiteId) || state.sites[0]; }
function getCoeffs(){ return state.calcCoeffs || DEFAULT_COEFFS; }
function markChanged(){ try{ localStorage.setItem('wm_lastChange', Date.now()); }catch(e){} }
/* ---- 批次A 資料 helper ---- */
function workList(){ if(!state.workItems) state.workItems=LOG_ITEMS.slice(); return state.workItems; }
function vendorList(){ if(!state.vendors) state.vendors={}; const sid=state.activeSiteId; if(!state.vendors[sid]) state.vendors[sid]=[]; return state.vendors[sid]; }
function recStore(){ if(!state.records) state.records={}; const sid=state.activeSiteId; if(!state.records[sid]) state.records[sid]=[]; return state.records[sid]; }
function progStore(){ if(!state.progress) state.progress={}; const sid=state.activeSiteId; if(!state.progress[sid]) state.progress[sid]=[]; return state.progress[sid]; }
function progById(id){ return progStore().find(p=>p.id===id); }
function upsertProgress(work, floor, vendor){ const list=progStore(); let p=list.find(x=>x.work===work && x.floor===floor); if(!p){ p={id:uid(), work, floor, percent:0, vendor:vendor||''}; list.push(p); } else if(vendor){ p.vendor=vendor; } return p; }

/* =================== IndexedDB 照片 store（foundation，供之後模組使用） =================== */
let _db=null;
function photoDB(){
  return new Promise((res,rej)=>{
    if(_db) return res(_db);
    const r=indexedDB.open('wm_photos',1);
    r.onupgradeneeded=e=>{ e.target.result.createObjectStore('photos',{keyPath:'id'}); };
    r.onsuccess=e=>{ _db=e.target.result; res(_db); };
    r.onerror=e=>rej(e);
  });
}
async function photoPut(id, blob, meta){ const db=await photoDB(); return new Promise((res,rej)=>{ const tx=db.transaction('photos','readwrite'); tx.objectStore('photos').put({id,blob,meta}); tx.oncomplete=()=>res(id); tx.onerror=rej; }); }
async function photoGet(id){ const db=await photoDB(); return new Promise((res,rej)=>{ const r=db.transaction('photos').objectStore('photos').get(id); r.onsuccess=()=>res(r.result); r.onerror=rej; }); }
async function photoDel(id){ const db=await photoDB(); return new Promise((res,rej)=>{ const tx=db.transaction('photos','readwrite'); tx.objectStore('photos').delete(id); tx.oncomplete=()=>res(); tx.onerror=rej; }); }
async function photoGetAll(){ const db=await photoDB(); return new Promise((res,rej)=>{ const r=db.transaction('photos').objectStore('photos').getAll(); r.onsuccess=()=>res(r.result||[]); r.onerror=rej; }); }
function blobToDataURL(b){ return new Promise((res,rej)=>{ const fr=new FileReader(); fr.onload=()=>res(fr.result); fr.onerror=rej; fr.readAsDataURL(b); }); }
function dataURLtoBlob(d){ const i=d.indexOf(','); const mime=(d.slice(0,i).match(/:(.*?);/)||[])[1]||'image/jpeg'; const bin=atob(d.slice(i+1)); const u=new Uint8Array(bin.length); for(let k=0;k<bin.length;k++)u[k]=bin.charCodeAt(k); return new Blob([u],{type:mime}); }

/* =================== UI helper =================== */
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1800); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function openModal(html){ document.getElementById('modalBox').innerHTML=html; document.getElementById('modalBg').classList.add('show'); }
function closeModal(){ document.getElementById('modalBg').classList.remove('show'); }

/* =================== 案場 =================== */
function renderSiteChips(){
  const el=document.getElementById('siteChips');
  el.innerHTML=state.sites.map(s=>`<button class="site-chip${s.id===state.activeSiteId?' on':''}" onclick="switchSite('${s.id}')">${esc(s.name)}</button>`).join('');
}
function switchSite(id){ state.activeSiteId=id; saveState(); renderAll(); }
function addSite(){
  openModal(`<h3>新增案場 <span class="x" onclick="closeModal()">×</span></h3>
    <label class="fld"><span>案場名稱</span><input class="inp" id="newSiteName" placeholder="例：青年安心住宅"></label>
    <button class="btn full" onclick="doAddSite()">建立</button>`);
  setTimeout(()=>document.getElementById('newSiteName').focus(),100);
}
function doAddSite(){
  const n=document.getElementById('newSiteName').value.trim(); if(!n) return toast('請輸入名稱');
  const id=uid(); state.sites.push({id,name:n}); state.activeSiteId=id; saveState(); closeModal(); renderAll();
}
function renameSite(){
  const s=activeSite();
  openModal(`<h3>重命名案場 <span class="x" onclick="closeModal()">×</span></h3>
    <label class="fld"><span>案場名稱</span><input class="inp" id="rnSiteName" value="${esc(s.name)}"></label>
    <div class="row"><button class="btn gray" onclick="delSite()">刪除案場</button><button class="btn" onclick="doRenameSite()">儲存</button></div>`);
}
function doRenameSite(){
  const n=document.getElementById('rnSiteName').value.trim(); if(!n) return toast('請輸入名稱');
  activeSite().name=n; saveState(); closeModal(); renderAll();
}
function delSite(){
  if(state.sites.length<=1) return toast('至少需保留一個案場');
  if(!confirm('確定刪除此案場？該案場日誌與材料資料會一併移除。')) return;
  const id=state.activeSiteId;
  state.sites=state.sites.filter(s=>s.id!==id);
  delete state.materials[id]; delete state.records[id]; delete state.progress[id]; delete state.vendors[id];
  state.attendance=(state.attendance||[]).map(a=>({...a, sites:(a.sites||[]).filter(x=>x!==id)})).filter(a=>(a.sites||[]).length);
  state.activeSiteId=state.sites[0].id; saveState(); closeModal(); renderAll();
}

/* =================== Tab =================== */
function switchTab(t){
  view.tab=t;
  ['log','prog','mat','photo'].forEach(x=>{
    document.getElementById('screen-'+x).classList.toggle('active', x===t);
    document.getElementById('tab-'+x).classList.toggle('on', x===t);
  });
  if(t==='mat') setMatMode(view.matMode||'list');
  if(t==='prog') renderProg();
  if(t==='photo') renderPhotoRecs();
}

/* =================== 月曆 =================== */
function moveMonth(d){
  view.calMonth+=d;
  if(view.calMonth<0){view.calMonth=11; view.calYear--;}
  if(view.calMonth>11){view.calMonth=0; view.calYear++;}
  renderCalendar();
}
function recordsOn(dateStr){ return recStore().filter(r=>r.date===dateStr); }
function attendOn(dateStr){ return (state.attendance||[]).filter(a=>a.date===dateStr && (a.sites||[]).includes(state.activeSiteId)); }
function workColor(work){ return ITEM_COLOR[work] || 'blue'; }
function dayColors(dateStr){
  const set=new Set();
  recordsOn(dateStr).forEach(r=>(r.items||[]).forEach(it=>{ const p=progById(it.progressId); if(p) set.add(workColor(p.work)); }));
  return ['blue','orange','red'].filter(c=>set.has(c));
}
function renderCalendar(){
  const y=view.calYear, m=view.calMonth;
  document.getElementById('calTitle').textContent=`${y} 年 ${m+1} 月`;
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  const wd=['日','一','二','三','四','五','六'];
  let html=wd.map(w=>`<div class="wd">${w}</div>`).join('');
  for(let i=0;i<first;i++) html+=`<div class="cal-cell muted-day"></div>`;
  const tStr=todayStr();
  for(let d=1;d<=days;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const colors=dayColors(ds);
    const dots=colors.map(c=>`<i style="background:${COLOR_HEX[c]}"></i>`).join('');
    const cls=['cal-cell']; if(ds===tStr)cls.push('today'); if(ds===view.selDate)cls.push('sel');
    html+=`<div class="${cls.join(' ')}" onclick="selectDate('${ds}')"><div class="dnum">${d}</div><div class="dots">${dots}</div></div>`;
  }
  document.getElementById('calGrid').innerHTML=html;
}
function selectDate(ds){ view.selDate=ds; renderCalendar(); renderDay(); }

function matTxOn(date){ return matTxStore().filter(t=>t.date===date); }
function matTxGroupCard(type, list){
  const lines=list.map(t=>{ const unit=getMatDef(t.item).unit||''; return `<div class="rc-line"><b>${esc(t.item)}</b> <span class="muted">${esc(t.spec||'')}</span> <span class="rc-pct">${f2(t.qty)}${esc(unit)}</span></div>`; }).join('');
  return `<div class="log-card"><div class="lc-top"><div style="font-weight:700">${type==='in'?'📦 進料':'📤 已用'}</div><span class="muted" style="font-size:12px">在材料頁編輯</span></div><div class="rc-items">${lines}</div></div>`;
}
function renderDay(){
  document.getElementById('dayTitle').textContent=`${view.selDate} 記錄`;
  const recs=recordsOn(view.selDate), atts=attendOn(view.selDate), txs=matTxOn(view.selDate);
  const ins=txs.filter(t=>t.type==='in'), outs=txs.filter(t=>t.type==='out');
  const box=document.getElementById('dayLogs');
  if(!recs.length && !atts.length && !txs.length){ box.innerHTML=`<div class="empty">這天還沒有記錄<br>點右上「＋ 新增」記錄施工或出勤</div>`; return; }
  let html = recs.map(recordCard).join('') + atts.map(attendCard).join('');
  if(ins.length) html += matTxGroupCard('in', ins);
  if(outs.length) html += matTxGroupCard('out', outs);
  box.innerHTML = html;
  loadCardThumbs(recs);
}
function recordCard(r){
  const items=(r.items||[]).map(it=>{
    const p=progById(it.progressId); if(!p) return '';
    const done=(+p.percent||0)>=100;
    return `<div class="rc-line"><span class="cdot" style="background:${COLOR_HEX[workColor(p.work)]}"></span><b>${esc(p.work||'-')}</b> <span class="muted">${esc(p.floor||'')}</span>${it.headcount?` <span class="rc-hc">${it.headcount}人</span>`:''} <span class="rc-pct${done?' done':''}">${done?'✓':(p.percent||0)+'%'}</span></div>`;
  }).join('');
  const photoStrip=(r.photos&&r.photos.length)?`<div class="photo-strip" id="ph-${r.id}"></div>`:'';
  return `<div class="log-card">
    <div class="lc-top"><div style="font-weight:700">${esc(r.vendor||'未填廠商')}</div><button class="btn green sm" onclick="shareRecord('${r.id}')">LINE</button></div>
    <div class="rc-items">${items||'<span class="muted">未選工項</span>'}</div>
    ${r.note?`<div class="lc-meta">${esc(r.note)}</div>`:''}
    ${photoStrip}
    <div style="margin-top:10px;display:flex;gap:8px">
      <button class="btn ghost sm" onclick="openRecordForm('${r.id}')">編輯</button>
      <button class="btn gray sm" onclick="delRecord('${r.id}')">刪除</button>
    </div>
  </div>`;
}
function attendCard(a){
  const names=(a.sites||[]).map(id=>{ const s=state.sites.find(x=>x.id===id); return s?s.name:''; }).filter(Boolean).join('、');
  return `<div class="log-card">
    <div class="lc-top"><div style="font-weight:700">🧑‍🔧 出勤</div><button class="btn gray sm" onclick="delAttend('${a.id}')">刪除</button></div>
    <div class="lc-meta">${esc(names||'—')}</div>
    <div style="margin-top:8px"><button class="btn ghost sm" onclick="openAttendForm('${a.id}')">編輯</button></div>
  </div>`;
}
async function loadCardThumbs(recs){
  for(const r of recs){
    if(!r.photos||!r.photos.length) continue;
    const el=document.getElementById('ph-'+r.id); if(!el) continue;
    let h='';
    for(const pid of r.photos){
      try{ const rec=await photoGet(pid); if(rec&&rec.blob){ const u=URL.createObjectURL(rec.blob); h+=`<div class="thumb"><img src="${u}" onclick="viewPhoto('${u}')"></div>`; } }catch(e){}
    }
    el.innerHTML=h;
  }
}
function viewPhoto(u){ openModal(`<div style="text-align:center"><img src="${u}" style="max-width:100%;border-radius:12px"><button class="btn full" style="margin-top:14px" onclick="closeModal()">關閉</button></div>`); }

let _logPhotos=[];       // 目前表單照片 [{id, blob?, url}]
let _origPhotoIds=[];    // 編輯前已存在的照片 id
let _rec=null;           // 目前編輯中的記錄/出勤暫存

function newEntry(){
  _rec={ type:'record', siteId:state.activeSiteId, origSiteId:state.activeSiteId, date:view.selDate, vendor:vendorList()[0]||'',
    items:[{work:'',floor:'',percent:0,headcount:''}], note:'', attendSites:[], editId:null };

}
function openRecordForm(id){
  const r=recStore().find(x=>x.id===id); if(!r)return;
  _rec={ type:'record', siteId:state.activeSiteId, origSiteId:state.activeSiteId, date:r.date, vendor:r.vendor||'',
    items:(r.items||[]).map(it=>{ const p=progById(it.progressId)||{}; return {progressId:it.progressId, work:p.work||'', floor:p.floor||'', percent:p.percent||0, headcount:(it.headcount===0?0:(it.headcount||''))}; }),
    note:r.note||'', attendSites:[], editId:id };
  if(!_rec.items.length) _rec.items=[{work:'',floor:'',percent:0,headcount:''}];
  _origPhotoIds=(r.photos||[]).slice(); _logPhotos=[];
  showRecordModal();
  (async()=>{ for(const pid of _origPhotoIds){ try{ const rec=await photoGet(pid); if(rec&&rec.blob)_logPhotos.push({id:pid,url:URL.createObjectURL(rec.blob)}); }catch(e){} } renderLogPhotoStrip(); })();
}
function openAttendForm(id){
  const a=(state.attendance||[]).find(x=>x.id===id);
  _rec={ type:'attend', siteId:state.activeSiteId, origSiteId:state.activeSiteId, date:a?a.date:view.selDate, vendor:'', items:[], note:'', attendSites:a?(a.sites||[]).slice():[state.activeSiteId], editId:id };

}

      <div id="recItems">${itemsHtml}</div>
      <button class="btn ghost sm full" style="margin:4px 0 14px" onclick="recAddItem()">＋ 項目</button>
      <div style="font-size:12px;font-weight:700;color:var(--text2);margin:2px 2px 4px">現場照片</div>
      <div class="photo-strip" id="lfPhotos"></div>
      <label class="btn ghost full" style="margin-bottom:12px">📷 拍照／選照片<input type="file" accept="image/*" capture="environment" multiple style="display:none" onchange="addLogPhotos(this.files);this.value=''"></label>
      <label class="fld"><span>備註</span><textarea class="inp" onchange="_rec.note=this.value" placeholder="補充說明…">${esc(_rec.note)}</textarea></label>`;
  } else {
    const checks=state.sites.map(s=>`<button type="button" class="opt${_rec.attendSites.includes(s.id)?' on':''}" onclick="toggleAttendSite('${s.id}',this)">${esc(s.name)}</button>`).join('');
    body=`<label class="fld"><span>日期</span><input class="inp" type="date" value="${esc(_rec.date)}" onchange="_rec.date=this.value"></label>
      <label class="fld"><span>當天有出工的案場（可多選）</span></label>

/* 照片 helper（記錄表單共用） */
function renderLogPhotoStrip(){
  const el=document.getElementById('lfPhotos'); if(!el)return;
  el.innerHTML=_logPhotos.length
    ? _logPhotos.map((p,i)=>`<div class="thumb"><img src="${p.url}"><button class="thumb-x" onclick="removeLogPhoto(${i})">×</button></div>`).join('')
    : '<span class="muted">尚無照片</span>';
}
function addLogPhotos(files){ [...files].forEach(f=>{ _logPhotos.push({id:uid(), blob:f, url:URL.createObjectURL(f)}); }); renderLogPhotoStrip(); }
function removeLogPhoto(i){ const p=_logPhotos[i]; if(p&&p.url)URL.revokeObjectURL(p.url); _logPhotos.splice(i,1); renderLogPhotoStrip(); }

async function saveEntry(){
  if(_rec.type==='attend'){
    if(!_rec.attendSites.length) return toast('請至少勾選一個案場');
    const a={ id:_rec.editId||uid(), date:_rec.date||todayStr(), sites:_rec.attendSites.slice() };
    if(!state.attendance) state.attendance=[];
    const idx=_rec.editId?state.attendance.findIndex(x=>x.id===_rec.editId):-1;
    if(idx>=0) state.attendance[idx]=a; else state.attendance.push(a);
    view.selDate=a.date; saveState(); closeModal(); renderCalendar(); renderDay(); toast('出勤已儲存'); return;
  }
  const valid=_rec.items.filter(it=>it.work);
  if(!valid.length) return toast('請至少選一個工項');
  // 切換到目標案場（表單裡選的），記錄/進度就存到那個案場
  const target=_rec.siteId||state.activeSiteId;
  if(_rec.editId && _rec.origSiteId && _rec.origSiteId!==target && state.records[_rec.origSiteId]){
    state.records[_rec.origSiteId]=state.records[_rec.origSiteId].filter(r=>r.id!==_rec.editId); // 從原案場移除
  }
  state.activeSiteId=target;
  for(const p of _logPhotos){ if(p.blob){ try{ await photoPut(p.id,p.blob,{date:_rec.date}); }catch(e){} } }
  const photos=_logPhotos.map(p=>p.id);
  for(const oid of _origPhotoIds){ if(!photos.includes(oid)){ try{ await photoDel(oid); }catch(e){} } }
  const items=valid.map(it=>{
    const p=upsertProgress(it.work, it.floor||'', _rec.vendor);
    p.percent=Math.max(0,Math.min(100,+it.percent||0)); if(_rec.vendor)p.vendor=_rec.vendor;
    return { progressId:p.id, headcount:(it.headcount===''?0:(+it.headcount||0)) };
  });
  const rec={ id:_rec.editId||uid(), date:_rec.date||todayStr(), vendor:_rec.vendor||'', items, note:_rec.note||'', photos };
  const store=recStore();
  const idx=_rec.editId?store.findIndex(r=>r.id===_rec.editId):-1;
  if(idx>=0) store[idx]=rec; else store.push(rec);
  view.selDate=rec.date; saveState(); closeModal(); renderAll(); toast('記錄已儲存');
}
function delRecord(id){
  if(!confirm('刪除此筆記錄？'))return;
  const r=recStore().find(x=>x.id===id);
  if(r&&r.photos) r.photos.forEach(pid=>photoDel(pid).catch(()=>{}));
  state.records[state.activeSiteId]=recStore().filter(x=>x.id!==id);
  saveState(); renderCalendar(); renderDay();
}
function delAttend(id){ if(!confirm('刪除此筆出勤？'))return; state.attendance=(state.attendance||[]).filter(x=>x.id!==id); saveState(); renderCalendar(); renderDay(); }

/* LINE 分享（記錄） */
function recordLineText(r){
  const lines=(r.items||[]).map(it=>{ const p=progById(it.progressId); if(!p)return ''; const done=(+p.percent||0)>=100; return `・${p.work} ${p.floor||''} ${it.headcount?it.headcount+'人 ':''}${done?'✓完成':(p.percent||0)+'%'}`; }).filter(Boolean).join('\n');
  return `【案場】${activeSite().name}\n【日期】${r.date}\n【廠商】${r.vendor||'-'}\n【施工項目】\n${lines}${r.note?'\n【備註】'+r.note:''}`;
}
async function shareRecord(id){
  const r=recStore().find(x=>x.id===id); if(!r)return;
  const txt=recordLineText(r);
  let files=[];
  if(r.photos&&r.photos.length){
    for(const pid of r.photos){ try{ const rec=await photoGet(pid); if(rec&&rec.blob){ const t=rec.blob.type||'image/jpeg'; const ext=t.includes('png')?'png':'jpg'; files.push(new File([rec.blob],pid+'.'+ext,{type:t})); } }catch(e){} }
  }
  try{ await navigator.clipboard.writeText(txt); }catch(e){}
  if(navigator.share){
    const payload={text:txt};
    if(files.length && navigator.canShare && navigator.canShare({files})) payload.files=files;
    try{ await navigator.share(payload); return; }catch(e){ if(e.name==='AbortError')return; }
  }
  toast(files.length?'文字已複製（此裝置不支援帶圖分享）':'已複製，貼到 LINE 群組即可');
}

// 資料模型：materials[sid] = { items: { 品項名:{ perBox:每箱支數|null, specs:[{id,label,ordered,actual,checked}] } } }
function matStore(){
  const sid=state.activeSiteId;
  let m=state.materials[sid];
  if(!m){ m=state.materials[sid]={items:{}, customItems:[]}; }
  else if(!m.items){ // 舊格式 {ordered,actual,checked} → 自動轉新格式
    const old=m, items={};
    const names=new Set([...Object.keys(old.ordered||{}),...Object.keys(old.actual||{}),...Object.keys(old.checked||{})]);
    names.forEach(nm=>{
      const target = nm==='收邊' ? '暗架收邊' : nm; // 舊「收邊」併到「暗架收邊」
      const def=MAT_DEF[target]||{};
      if(!items[target]) items[target]={perBox:def.perBox||null, specs:[]};
      items[target].specs.push({id:uid(), label:'一般',
        ordered:(old.ordered&&old.ordered[nm]!=null)?old.ordered[nm]:'',
        actual:(old.actual&&old.actual[nm]!=null)?old.actual[nm]:'',
        checked:!!(old.checked&&old.checked[nm])});
    });
    m=state.materials[sid]={items, customItems:[]};
  }
  if(!m.customItems) m.customItems=[];
  return m;
}
/* 可自由編輯的材料目錄（分案場）：catalog[sid]=[{id,name,items:[{id,name,unit,perBox,presets}]}] */
function catalogStore(){
  if(!state.catalog) state.catalog={};
  const sid=state.activeSiteId;
  if(!state.catalog[sid]){
    const cats=MAT_CATS.map(c=>({ id:uid(), name:c.name, items:c.items.map(it=>({id:uid(), name:it.name, unit:it.unit||'', perBox:it.perBox||null, presets:(it.presets||[]).slice()})) }));
    const m=state.materials[sid];
    if(m){
      const known=new Set(); cats.forEach(c=>c.items.forEach(i=>known.add(i.name)));
      const catName={frame:'隔間/天花骨架',board:'板材類',extra:'其他材料'};
      (m.customItems||[]).forEach(ci=>{ if(known.has(ci.name))return; let cat=cats.find(c=>c.name===catName[ci.cat])||cats[cats.length-1]; cat.items.push({id:uid(),name:ci.name,unit:ci.unit||'',perBox:ci.perBox||null,presets:(ci.presets||[]).slice()}); known.add(ci.name); });
      Object.keys(m.items||{}).forEach(nm=>{ if(known.has(nm))return; cats[cats.length-1].items.push({id:uid(),name:nm,unit:'',perBox:(m.items[nm].perBox||null),presets:[]}); known.add(nm); });
    }
    state.catalog[sid]=cats;
  }
  return state.catalog[sid];
}
function getMatDef(name){ for(const c of catalogStore()){ const it=c.items.find(x=>x.name===name); if(it) return it; } return {unit:'',presets:[]}; }
function findCatItem(name){ for(const c of catalogStore()){ const it=c.items.find(x=>x.name===name); if(it) return {cat:c, item:it}; } return null; }
function nameExists(name){ return catalogStore().some(c=>c.items.some(i=>i.name===name)); }
function matItem(name){ const m=matStore(); if(!m.items[name]){ m.items[name]={specs:[]}; } return m.items[name]; }
function f2(n){ return Math.round((+n||0)*100)/100; }

function addItem(catId){ const name=(document.getElementById('itName').value||'').trim(); if(!name)return toast('請輸入名稱'); if(nameExists(name))return toast('已有同名品項'); const c=catalogStore().find(x=>x.id===catId); if(!c)return; const unit=document.getElementById('itUnit').value; const pb=parseFloat(document.getElementById('itPerBox').value)||null; c.items.push({id:uid(),name,unit,perBox:pb,presets:[]}); saveState(); closeModal(); renderMat(); }

function renameItem(oldName){ const n=(document.getElementById('itNewName').value||'').trim(); if(!n)return toast('請輸入名稱'); if(n!==oldName && nameExists(n))return toast('已有同名品項'); const f=findCatItem(oldName); if(f){ f.item.name=n; const m=matStore(); if(m.items[oldName]){ m.items[n]=m.items[oldName]; delete m.items[oldName]; } } saveState(); closeModal(); renderMat(); }
function delItem(name){ if(!confirm('刪除品項「'+name+'」？已填數量也會移除。'))return; const f=findCatItem(name); if(f){ f.cat.items=f.cat.items.filter(i=>i.name!==name); } delete matStore().items[name]; saveState(); renderMat(); }
function moveItem(name,dir){ const f=findCatItem(name); if(!f)return; const arr=f.cat.items; const i=arr.findIndex(x=>x.name===name); const j=i+dir; if(j<0||j>=arr.length)return; [arr[i],arr[j]]=[arr[j],arr[i]]; saveState(); renderMat(); }

/* 長按改名 + 拖曳排序（材料分類/品項，事件委派，只綁一次） */
let _lpTimer=null, _lpFired=false, _dragInfo=null;
function reorderTo(kind, key, beforeKey){
  if(kind==='cat'){
    const cats=catalogStore(); const from=cats.findIndex(c=>c.id===key); if(from<0)return;
    const [moved]=cats.splice(from,1); let to=beforeKey?cats.findIndex(c=>c.id===beforeKey):cats.length; if(to<0)to=cats.length; cats.splice(to,0,moved);
  } else {
    const f=findCatItem(key); if(!f)return; const arr=f.cat.items; const from=arr.findIndex(i=>i.name===key); if(from<0)return;
    const [moved]=arr.splice(from,1); let to=beforeKey?arr.findIndex(i=>i.name===beforeKey):arr.length; if(to<0)to=arr.length; arr.splice(to,0,moved);
  }
  saveState(); renderMat();
}
function matPointerInit(){
  document.addEventListener('pointerdown', e=>{
    const handle=e.target.closest('.drag-handle');
    if(handle){ const row=handle.closest('[data-row]'); if(row){ e.preventDefault(); _dragInfo={kind:row.dataset.kind, key:row.dataset.key, container:row.parentElement}; row.classList.add('dragging'); } return; }
    const nm=e.target.closest('.lp-name');
    if(nm){ const row=nm.closest('[data-row]'); if(!row)return; _lpFired=false;
      _lpTimer=setTimeout(()=>{ _lpFired=true; if(row.dataset.kind==='cat')renameCatPrompt(row.dataset.key); else renameItemPrompt(row.dataset.key); }, 500); }
  });
  document.addEventListener('pointermove', ()=>{ if(_lpTimer){clearTimeout(_lpTimer); _lpTimer=null;} });
  document.addEventListener('pointerup', e=>{
    if(_lpTimer){clearTimeout(_lpTimer); _lpTimer=null;}
    if(_dragInfo){
      const rows=[..._dragInfo.container.querySelectorAll('[data-row]')].filter(r=>r.dataset.kind===_dragInfo.kind);
      let beforeKey=null;
      for(const r of rows){ const b=r.getBoundingClientRect(); if(e.clientY < b.top+b.height/2){ beforeKey=r.dataset.key; break; } }
      const di=_dragInfo; _dragInfo=null;
      if(beforeKey!==di.key) reorderTo(di.kind, di.key, beforeKey);
      else { const row=di.container.querySelector('.dragging'); if(row)row.classList.remove('dragging'); }
    }
  });
}

function openMatDetail(name){
  _matDetail=name;
  const def=getMatDef(name); const unit=def.unit||'';
  const txs=itemTxs(name);
  // 各規格 進/用/剩
  const map={}, order=[];
  txs.forEach(t=>{ const k=t.spec||'(未分規格)'; if(!(k in map)){map[k]={in:0,out:0};order.push(k);} map[k][t.type==='in'?'in':'out']+=(+t.qty||0); });

  openModal(`<h3>${esc(name)} <small style="color:var(--text2);font-size:13px">${esc(unit)}</small> <span class="x" onclick="closeMatDetail()">×</span></h3>
    <div class="inv-summary">

      <div style="font-size:24px;font-weight:800;color:var(--blue)">${totalBal} <small style="font-size:14px;color:var(--text2)">${esc(unit)}</small></div>
      <div style="margin-top:8px">${specRows}</div>
    </div>
    <div style="display:flex;gap:8px;margin:14px 0">
      <button class="btn full green" onclick="openTxForm('${esc(name)}','in')">＋ 進料</button>
      <button class="btn full" onclick="openTxForm('${esc(name)}','out')">＋ 已用</button>
    </div>
    <div style="font-size:12px;font-weight:700;color:var(--text2);margin:6px 2px 4px">進出紀錄</div>
    ${txList}
    <button class="btn ghost full" style="margin-top:14px" onclick="closeMatDetail()">完成</button>`);

function ordAddLine(){ _order.lines.push({name:'',spec:'',qty:'',unit:''}); showOrderModal(); }
function ordDelLine(i){ _order.lines.splice(i,1); if(!_order.lines.length)_order.lines.push({name:'',spec:'',qty:'',unit:''}); showOrderModal(); }
function saveOrder(){

function orderLineText(o){ const lines=o.lines.map(l=>`・${l.name}${l.spec?' '+l.spec:''} ×${l.qty}${l.unit||''}`).join('\n'); return `【材料訂單】${activeSite().name}\n【日期】${o.date}\n【送貨地點】${o.location||'-'}\n${lines}${o.note?'\n【備註】'+o.note:''}`; }
async function shareOrder(id){
  const o=ordStore().find(x=>x.id===id); if(!o)return;

/* =================== 工項進度（雙檢視，資料來自記錄；亦可直接編輯） =================== */
function totalHeadcount(){ let t=0; recStore().forEach(r=>(r.items||[]).forEach(it=>t+=(+it.headcount||0))); return Math.round(t*10)/10; }
function headcountByWork(work){ let t=0; recStore().forEach(r=>(r.items||[]).forEach(it=>{ const p=progById(it.progressId); if(p&&p.work===work)t+=(+it.headcount||0); })); return Math.round(t*10)/10; }
function vendorByWork(work){ const set=new Set(); progStore().forEach(p=>{ if(p.work===work&&p.vendor)set.add(p.vendor); }); return [...set].join('、'); }
function vendorHeadcounts(){ const map={}, order=[]; recStore().forEach(r=>{ const k=r.vendor||'(未填廠商)'; (r.items||[]).forEach(it=>{ if(!(k in map)){map[k]=0;order.push(k);} map[k]+=(+it.headcount||0); }); }); return {map,order}; }
function toggleProgEdit(){
  view.progEdit=!view.progEdit;
  const b=document.getElementById('progEditBtn');
  b.textContent=view.progEdit?'完成':'編輯'; b.classList.toggle('green',view.progEdit);
  renderProg();
}
function toggleProgView(){ view.progView = view.progView==='floor'?'work':'floor'; renderProg(); }
function floorOrderNum(f){ const m=String(f).match(/^([BR]?)(\d+)/i); if(!m) return 99999; let n=parseInt(m[2]); const pfx=(m[1]||'').toUpperCase(); if(pfx==='B')n=-1000-n; if(pfx==='R')n=10000+n; return n; }
function renderProgSummary(){
  const list=progStore();
  const avg=list.length?Math.round(list.reduce((t,p)=>t+(+p.percent||0),0)/list.length):0;
  const {map,order}=vendorHeadcounts();
  const vstr = order.length ? order.map(v=>`${esc(v)} 總出工${Math.round(map[v]*10)/10}人`).join('　') : esc(activeSite().name);
  document.getElementById('progSummary').innerHTML=`<div class="card prog-summary">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
      <div class="muted" style="font-size:13px;line-height:1.6;flex:1">${vstr}</div>
      <div style="font-size:24px;font-weight:800;color:#FF2D78">${avg}%</div>
    </div>
    <div class="grad-bar"><div class="grad-fill" style="width:${avg}%"></div></div>
  </div>`;
}
function renderProg(){
  const vb=document.getElementById('progViewBtn'); if(vb) vb.textContent = view.progView==='floor'?'依樓層':'依工項';
  renderProgSummary();
  const list=progStore();
  const box=document.getElementById('progList');
  if(!list.length){ box.innerHTML=`<div class="empty">還沒有進度資料<br>到「日誌」新增記錄、拉進度，這裡會自動出現<br>（或點右上「＋ 工項」直接新增）</div>`; return; }
  box.innerHTML = view.progView==='floor' ? progHtmlByFloor(list) : progHtmlByWork(list);
}
function floorPill(p){ const v=Math.max(0,Math.min(100,+p.percent||0)); const cls=v>=100?'done':(v>0?'active':'zero'); return `<span class="floor-pill ${cls}" onclick="openProgCard('${p.id}')">${esc(p.floor||'?')} ${v}%</span>`; }
function workPill(p){ const v=Math.max(0,Math.min(100,+p.percent||0)); const cls=v>=100?'done':(v>0?'active':'zero'); return `<span class="floor-pill ${cls}" onclick="openProgCard('${p.id}')">${esc(p.work)} ${v}%</span>`; }
function progSect(name, kind, avg, meta, collapsed, pillsHtml, delFn){
  const caret=collapsed?'▶':'▼';
  const del=view.progEdit?` <button class="del" onclick="event.stopPropagation();${delFn}">🗑</button>`:'';
  return `<div class="prog-sect">
    <div class="ps-head" onclick="${kind}">
      <span class="ps-name">${esc(name)}</span>
      <span class="ps-meta">${meta?esc(meta)+' ':''}<b>${avg}%</b>${del} <span class="ps-caret">${caret}</span></span>
    </div>
    <div class="thin-bar"><div class="thin-fill${avg>=100?' full':''}" style="width:${avg}%"></div></div>
    ${collapsed?'':`<div class="floor-pills">${pillsHtml}</div>`}
  </div>`;
}
function progHtmlByWork(list){
  const groups={}, order=[];
  list.forEach(p=>{ if(!groups[p.work]){groups[p.work]=[];order.push(p.work);} groups[p.work].push(p); });
  return order.map(work=>{
    const g=groups[work]; g.sort((a,b)=>floorOrderNum(a.floor)-floorOrderNum(b.floor));
    const avg=Math.round(g.reduce((t,p)=>t+(+p.percent||0),0)/g.length);
    const hc=headcountByWork(work);
    const meta=[vendorByWork(work), hc?hc+'人':''].filter(Boolean).join(' ');
    return progSect(work||'(未命名)', `toggleWork('${esc(work)}')`, avg, meta, view.workCollapsed[work], g.map(floorPill).join(''), `delWorkGroup('${esc(work)}')`);
  }).join('');
}
function progHtmlByFloor(list){
  const groups={}, order=[];
  list.forEach(p=>{ const f=p.floor||'(未填樓層)'; if(!groups[f]){groups[f]=[];order.push(f);} groups[f].push(p); });
  order.sort((a,b)=>floorOrderNum(a)-floorOrderNum(b));
  return order.map(floor=>{
    const g=groups[floor];
    const avg=Math.round(g.reduce((t,p)=>t+(+p.percent||0),0)/g.length);
    return progSect(floor, `toggleFloorC('${esc(floor)}')`, avg, '', view.floorCollapsed[floor], g.map(workPill).join(''), `delFloorGroup('${esc(floor)}')`);
  }).join('');
}
function toggleWork(w){ view.workCollapsed[w]=!view.workCollapsed[w]; renderProg(); }
function toggleFloorC(f){ view.floorCollapsed[f]=!view.floorCollapsed[f]; renderProg(); }
function delProg(id){ state.progress[state.activeSiteId]=progStore().filter(p=>p.id!==id); saveState(); renderProg(); }
function delWorkGroup(work){ if(!confirm('刪除整個「'+(work||'未命名')+'」工項的所有樓層進度？'))return; state.progress[state.activeSiteId]=progStore().filter(p=>(p.work||'')!==(work||'')); saveState(); renderProg(); }
function delFloorGroup(floor){ const target=floor==='(未填樓層)'?'':floor; if(!confirm('刪除「'+floor+'」的所有工項進度？'))return; state.progress[state.activeSiteId]=progStore().filter(p=>(p.floor||'')!==target); saveState(); renderProg(); }
function openProgCard(id){
  const p=progById(id); if(!p)return;
  const v=Math.max(0,Math.min(100,+p.percent||0));
  openModal(`<h3>${esc(p.work)} — ${esc(p.floor||'')} <span class="x" onclick="closeModal()">×</span></h3>
    <div class="prog-rowtop"><span class="prog-floor">進度</span><span class="prog-pct" id="card-pct">${v}%</span></div>
    <div class="prog-bar"><div class="prog-fill${v>=100?' full':''}" id="card-fill" style="width:${v}%"></div></div>
    <input class="prog-slider" type="range" min="0" max="100" step="5" value="${v}" oninput="document.getElementById('card-pct').textContent=this.value+'%';document.getElementById('card-fill').style.width=this.value+'%'" onchange="setProgPctCard('${id}',this.value)">
    <div class="row" style="margin-top:16px"><button class="btn gray" onclick="delProgCard('${id}')">刪除此項</button><button class="btn" onclick="closeModal()">完成</button></div>`);
}
function setProgPctCard(id,v){ const p=progById(id); if(p){ p.percent=Math.max(0,Math.min(100,parseInt(v)||0)); saveState(); renderProg(); } }
function delProgCard(id){ if(!confirm('刪除此進度項？'))return; delProg(id); closeModal(); }
function openProgAdd(){
  const opts=['<option value="">選擇工項</option>',...workList().map(w=>`<option>${esc(w)}</option>`)].join('');
  openModal(`<h3>新增進度項 <span class="x" onclick="closeModal()">×</span></h3>
    <label class="fld"><span>工項</span><select class="inp" id="paWork">${opts}</select></label>
    <label class="fld"><span>樓層/區域</span><input class="inp" id="paFloor" placeholder="例：3F-A區"></label>
    <label class="fld"><span>目前進度 %</span><input class="inp" id="paPct" type="number" inputmode="numeric" value="0"></label>
    <button class="btn full" onclick="addProgDirect()">新增</button>`);
}
function addProgDirect(){
  const work=(document.getElementById('paWork').value||'').trim();
  const floor=(document.getElementById('paFloor').value||'').trim();
  let pct=parseInt(document.getElementById('paPct').value)||0; pct=Math.max(0,Math.min(100,pct));

  saveState(); closeModal(); renderProg();
}

/* =================== 設定／備份還原 =================== */
function applyTheme(){
  const t=localStorage.getItem('wm_theme')||'light';
  document.body.classList.toggle('dark', t==='dark');
  const meta=document.querySelector('meta[name="theme-color"]'); if(meta)meta.content=(t==='dark'?'#000000':'#007AFF');
}
function toggleTheme(){ const cur=localStorage.getItem('wm_theme')||'light'; localStorage.setItem('wm_theme', cur==='dark'?'light':'dark'); applyTheme(); openSettings(); }
function fmtTime(ts){ if(!ts) return '尚未'; const d=new Date(+ts); const p=n=>String(n).padStart(2,'0'); return `${d.getMonth()+1}/${d.getDate()} ${p(d.getHours())}:${p(d.getMinutes())}`; }
function openSettings(){
  const theme=localStorage.getItem('wm_theme')||'light';
  const ch=+localStorage.getItem('wm_lastChange')||0, bk=+localStorage.getItem('wm_lastBackup')||0;
  const need = ch>bk;

    <div class="set-row"><span>外觀模式</span><button class="btn ghost sm" onclick="toggleTheme()">${theme==='dark'?'☀️ 切換為淺色':'🌙 切換為深色'}</button></div>
    <div style="border-top:1px solid var(--border);margin:12px 0"></div>

    <div class="bk-times${need?' need':''}">
      <div>最後變動：<b>${fmtTime(ch)}</b></div>
      <div>上次備份：<b>${fmtTime(bk)}</b></div>
      ${need?'<div class="bk-warn">⚠️ 有變動還沒備份，建議現在備份</div>':'<div class="bk-ok">✅ 已是最新備份</div>'}
    </div>
    <button class="btn full" style="margin:12px 0 10px" onclick="exportBackup()">⬇️ 匯出備份（所有資料＋照片）</button>
    <label class="btn ghost full" style="margin-bottom:16px">⬆️ 還原備份（選擇備份檔）
      <input type="file" accept="application/json,.json" style="display:none" onchange="importBackup(this)">
    </label>
    <div class="warn" style="margin-top:0">⚠️ 請<b>不要刪除主畫面圖示</b> —— 刪除會清掉手機上的資料。</div>`);
}
async function exportBackup(){
  toast('正在打包備份…');
  let photos=[];
  try{ const all=await photoGetAll(); for(const p of all){ if(p&&p.blob){ photos.push({id:p.id, meta:p.meta||null, data:await blobToDataURL(p.blob)}); } } }catch(e){}
  const backup={ app:'泰郡工務系統', version:1, exportedAt:new Date().toISOString(), state, photos };
  const fname=`泰郡工務備份_${todayStr()}.json`;
  const file=new File([JSON.stringify(backup)], fname, {type:'application/json'});
  try{ localStorage.setItem('wm_lastBackup', Date.now()); }catch(e){}
  if(navigator.canShare && navigator.canShare({files:[file]})){
    try{ await navigator.share({files:[file], title:'泰郡工務系統備份'}); return; }catch(e){ if(e.name==='AbortError') return; }
  }
  const url=URL.createObjectURL(file);
  const a=document.createElement('a'); a.href=url; a.download=fname; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),3000);
  toast('已匯出備份檔');
}
async function importBackup(input){
  const file=input.files&&input.files[0]; if(!file) return;
  let backup;
  try{ backup=JSON.parse(await file.text()); }catch(e){ input.value=''; return toast('檔案讀取失敗'); }
  if(!backup || !backup.state || !backup.state.sites || !backup.state.sites.length){ input.value=''; return toast('這不是有效的備份檔'); }
  input.value='';
  if(!confirm('還原會「覆蓋」目前 App 內的所有資料，確定要還原嗎？')) return;
  state=migrateState(backup.state); saveState();
  if(!state.sites.find(s=>s.id===state.activeSiteId)) state.activeSiteId=state.sites[0].id;
  if(backup.photos && backup.photos.length){
    toast('正在還原照片…');
    for(const p of backup.photos){ try{ if(p.data) await photoPut(p.id, dataURLtoBlob(p.data), p.meta||{}); }catch(e){} }
  }
  saveState(); closeModal(); renderAll(); toast('✅ 已還原備份');
}

/* =================== PWA manifest（inline，免額外檔） =================== */
function setupPWA(){
  const icon='data:image/svg+xml,'+encodeURIComponent(
    `<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192"><rect width="192" height="192" rx="42" fill="#007AFF"/><text x="96" y="120" font-size="70" text-anchor="middle" fill="#fff" font-family="sans-serif" font-weight="bold">泰郡</text></svg>`);
  const manifest={ name:'泰郡工務系統', short_name:'泰郡工務', start_url:'.', display:'standalone',
    background_color:'#f2f2f7', theme_color:'#007AFF',
    icons:[{src:icon, sizes:'192x192', type:'image/svg+xml', purpose:'any'}] };
  const url=URL.createObjectURL(new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'}));
  const link=document.createElement('link'); link.rel='manifest'; link.href=url; document.head.appendChild(link);
  const al=document.createElement('link'); al.rel='apple-touch-icon'; al.href=icon; document.head.appendChild(al);
}

/* =================== Service Worker（網路優先：自動更新 + 離線可用） =================== */
function registerSW(){
  if(!('serviceWorker' in navigator)) return;
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

/* =================== init =================== */
function renderAll(){ renderSiteChips(); renderCalendar(); renderDay(); renderProg(); renderMat(); }
function init(){ applyTheme(); setupPWA(); registerSW(); matPointerInit(); renderAll(); }
init();
</script>
