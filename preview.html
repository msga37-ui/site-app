<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>進度色比較 v2</title>
<style>
:root{--card:#1c1c1e;--text:#f2f2f7;--text2:#98989f;--inp:#2c2c2e;--green:#34C759;--blue:#007AFF}
*{box-sizing:border-box}
body{margin:0;background:#000;color:var(--text);font-family:-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif;padding:18px 14px 40px}
h1{font-size:18px;margin:4px 2px 4px}
.note{color:var(--text2);font-size:13px;margin:0 2px 18px;line-height:1.6}
.sw{background:var(--card);border-radius:16px;padding:16px 16px 18px;margin-bottom:14px}
.sw .lab{display:flex;align-items:center;gap:8px;font-weight:800;font-size:15px;margin-bottom:2px}
.sw .hex{color:var(--text2);font-weight:600;font-size:12px}
.sw .row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-top:6px}
.sw .vend{color:var(--text2);font-size:13px;flex:1}
.sw .big{font-size:28px;font-weight:800;letter-spacing:-.5px}
.gbar{height:14px;border-radius:999px;background:var(--inp);overflow:hidden;margin-top:10px}
.gfill{height:100%;border-radius:999px}
.tline{display:flex;align-items:center;gap:10px;margin-top:14px}
.tname{font-size:14px;font-weight:700;flex:none}
.tpct{margin-left:auto;font-weight:800;font-size:15px}
.tbar{flex:1;height:12px;border-radius:6px;background:var(--inp);overflow:hidden}
.tfill{height:100%;border-radius:6px;width:80%}
.pill{display:inline-block;margin-top:12px;font-size:13px;font-weight:700;padding:7px 13px;border-radius:999px;border:1.5px solid}
.lk{display:inline-block;margin-top:10px;color:var(--blue);font-weight:700;font-size:13px}
</style>
</head>
<body>
<h1>進度色比較 v2</h1>
<p class="note">靛藍跟一般藍/字太接近會失焦，這批換成「跟藍色明顯區隔、對比夠又不刺眼」的候選。每張下面那個藍字「編輯」是一般UI藍，幫你對比進度色有沒有跟它分得開。挑一個把<b>編號</b>給我。</p>
<div id="list"></div>
<script>
const opts=[
  ['1','青綠 teal','#10A8A8'],
  ['2','深青 cyan','#0E8FC0'],
  ['3','琥珀 amber','#E08A0B'],
  ['4','珊瑚 coral','#F26A5E'],
  ['5','玫瑰 rose','#DE4E7C'],
  ['6','紫羅蘭 violet','#8B5CF6'],
  ['7','靛藍（目前，太接近藍）','#5856D6'],
];
document.getElementById('list').innerHTML=opts.map(([n,name,c])=>`
  <div class="sw">
    <div class="lab"><span style="display:inline-block;width:14px;height:14px;border-radius:4px;background:${c}"></span>${n}. ${name} <span class="hex">${c}</span></div>
    <div class="row">
      <div class="vend">黑貓工程行 總出工29人</div>
      <div class="big" style="color:${c}">90%</div>
    </div>
    <div class="gbar"><div class="gfill" style="width:90%;background:linear-gradient(90deg,${c}55,${c})"></div></div>
    <div class="tline">
      <span class="tname">隔間牆批土</span>
      <span class="tbar"><span class="tfill" style="background:${c}"></span></span>
      <span class="tpct" style="color:${c}">80%</span>
    </div>
    <div>
      <span class="pill" style="color:${c};border-color:${c};background:${c}14">A棟4F 80%</span>
      <span class="lk">編輯</span>
    </div>
  </div>`).join('');
</script>
</body>
</html>
